<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hackysackium</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: rgba(255,255,255,0.07);
    --accent: #c8f135;
    --accent2: #8bba1f;
    --text: #f0f0ec;
    --muted: #888890;
    --red: #ff5252;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── NAV ── */
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2rem;
    height: 60px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(13,13,15,0.92);
    backdrop-filter: blur(12px);
    z-index: 100;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.7rem;
    letter-spacing: 2px;
    color: var(--accent);
  }
  .logo span { color: var(--text); }
  .nav-search {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 14px;
    width: 280px;
    transition: border-color 0.2s;
  }
  .nav-search:focus-within { border-color: var(--accent); }
  .nav-search svg { color: var(--muted); flex-shrink: 0; }
  .nav-search input {
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    width: 100%;
  }
  .nav-search input::placeholder { color: var(--muted); }

  /* ── HERO ── */
  .hero {
    padding: 5rem 2rem 3rem;
    max-width: 900px;
    margin: 0 auto;
  }
  .hero-tag {
    display: inline-block;
    background: var(--accent);
    color: #0d0d0f;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 4px;
    margin-bottom: 1.2rem;
  }
  .hero h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 8vw, 6rem);
    line-height: 0.95;
    letter-spacing: 3px;
    color: var(--text);
  }
  .hero h1 em { color: var(--accent); font-style: normal; }
  .hero p {
    margin-top: 1.2rem;
    color: var(--muted);
    font-size: 1rem;
    max-width: 500px;
    line-height: 1.7;
  }

  /* ── FILTERS ── */
  .filters {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 2rem 1.5rem;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .filter-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    padding: 6px 16px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #0d0d0f;
    font-weight: 600;
  }

  /* ── RESULTS GRID ── */
  .results-grid {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 2rem 4rem;
    display: grid;
    gap: 16px;
  }

  .no-results {
    text-align: center;
    padding: 4rem;
    color: var(--muted);
    font-size: 1rem;
  }

  /* ── TOURNAMENT CARD ── */
  .tournament-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.15s;
    cursor: pointer;
  }
  .tournament-card:hover { border-color: rgba(200,241,53,0.3); transform: translateY(-1px); }

  .card-header {
    padding: 1.2rem 1.4rem;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1rem;
    border-bottom: 1px solid var(--border);
  }
  .card-meta { flex: 1; }
  .card-season {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .card-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 1px;
    color: var(--text);
    line-height: 1.1;
  }
  .card-info {
    margin-top: 6px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }
  .card-info span {
    font-size: 0.8rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .card-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 14px;
    text-align: center;
    flex-shrink: 0;
  }
  .card-badge .num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    color: var(--accent);
    line-height: 1;
    display: block;
  }
  .card-badge .label {
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* ── STANDINGS TABLE ── */
  .standings-wrap { display: none; }
  .standings-wrap.open { display: block; }

  .standings-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }
  .standings-table thead tr {
    background: var(--surface2);
  }
  .standings-table th {
    padding: 8px 14px;
    text-align: left;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .standings-table th.right { text-align: right; }
  .standings-table td {
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    color: var(--text);
  }
  .standings-table td.right { text-align: right; font-variant-numeric: tabular-nums; }
  .standings-table tbody tr:hover { background: rgba(255,255,255,0.02); }

  .rank-cell {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 500;
  }
  .rank-num {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.72rem;
    font-weight: 600;
    background: var(--surface2);
    color: var(--muted);
    flex-shrink: 0;
  }
  .rank-num.gold { background: #b8860b; color: #ffe680; }
  .rank-num.silver { background: #555; color: #ccc; }
  .rank-num.bronze { background: #6b3a1f; color: #d4956a; }

  .score-bar-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    justify-content: flex-end;
  }
  .score-bar {
    height: 4px;
    border-radius: 2px;
    background: var(--accent);
    opacity: 0.5;
  }

  .expand-btn {
    width: 100%;
    background: none;
    border: none;
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    padding: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: color 0.15s, background 0.15s;
  }
  .expand-btn:hover { color: var(--accent); background: rgba(200,241,53,0.04); }
  .expand-btn svg { transition: transform 0.2s; }
  .expand-btn.open svg { transform: rotate(180deg); }

  /* ── FOOTER ── */
  footer {
    border-top: 1px solid var(--border);
    padding: 1.5rem 2rem;
    text-align: center;
    color: var(--muted);
    font-size: 0.78rem;
  }
  footer span { color: var(--accent); }

  /* ── SCROLL REVEAL ── */
  .card-reveal {
    opacity: 0;
    transform: translateY(16px);
    animation: reveal 0.35s ease forwards;
  }
  @keyframes reveal {
    to { opacity: 1; transform: none; }
  }
</style>
</head>
<body>

<nav>
  <div class="logo">Hacky<span>sackium</span></div>
  <div class="nav-search">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Search tournaments or players…" autocomplete="off">
  </div>
</nav>

<section class="hero">
  <div class="hero-tag">Official Results</div>
  <h1>The <em>World</em><br>of Hackysack</h1>
  <p>Complete tournament results, standings, and scores. The definitive record of competitive footbag.</p>
</section>

<div class="filters">
  <button class="filter-btn active" data-filter="all">All tournaments</button>
  <button class="filter-btn" data-filter="2025">2025</button>
  <button class="filter-btn" data-filter="2024">2024</button>
  <button class="filter-btn" data-filter="invitational">Invitational</button>
  <button class="filter-btn" data-filter="open">Open</button>
  <button class="filter-btn" data-filter="championship">Championship</button>
</div>

<div class="results-grid" id="resultsGrid"></div>

<footer>
  <p>Hackysackium &mdash; Official footbag tournament results &mdash; &copy; <span id="yr"></span></p>
</footer>

<script>
// ════════════════════════════════════════════════════════════════════
//  ▶  TOURNAMENT DATA — EDIT HERE TO ADD / CHANGE TOURNAMENTS
//     Copy a tournament object, paste it, and change the values.
//     Fields:
//       id        — unique string, no spaces
//       title     — tournament name
//       date      — display date string
//       location  — city, state / venue
//       season    — e.g. "2025 Season" or "Spring Invitational"
//       tags      — array, used for filter buttons (lowercase)
//       standings — array of player objects, sorted 1st → last:
//                   { name, school (optional), score, tiebreak (optional) }
// ════════════════════════════════════════════════════════════════════

const TOURNAMENTS = [

  {
    id: "midwest-open-2025",
    title: "Midwest Open",
    date: "April 12, 2025",
    location: "Kansas City, MO",
    season: "2025 Season",
    tags: ["2025", "open"],
    standings: [
      { name: "Jordan Ellis",    school: "KC Footbag Club",    score: 142.5 },
      { name: "Sam Rivera",      school: "Unaffiliated",       score: 137.0 },
      { name: "Taylor Nguyen",   school: "STL Hackers",        score: 131.8 },
      { name: "Morgan Blake",    school: "KC Footbag Club",    score: 128.4 },
      { name: "Casey Patel",     school: "Unaffiliated",       score: 119.9 },
      { name: "Alex Duren",      school: "Omaha Footbag",      score: 114.2 },
      { name: "Robin Okafor",    school: "STL Hackers",        score: 108.7 },
      { name: "Drew Matsuda",    school: "KC Footbag Club",    score: 101.3 },
    ]
  },

  {
    id: "spring-invitational-2025",
    title: "Spring Invitational",
    date: "March 1, 2025",
    location: "Chicago, IL",
    season: "2025 Season",
    tags: ["2025", "invitational"],
    standings: [
      { name: "Sam Rivera",      school: "Unaffiliated",       score: 155.0 },
      { name: "Avery Choi",      school: "Chicago Sack Co.",   score: 149.3 },
      { name: "Jordan Ellis",    school: "KC Footbag Club",    score: 144.6 },
      { name: "Reese Hammond",   school: "Great Lakes FC",     score: 138.2 },
      { name: "Taylor Nguyen",   school: "STL Hackers",        score: 130.5 },
      { name: "Quinn Adler",     school: "Chicago Sack Co.",   score: 123.8 },
      { name: "Morgan Blake",    school: "KC Footbag Club",    score: 118.0 },
    ]
  },

  {
    id: "national-championship-2024",
    title: "National Championship",
    date: "November 9, 2024",
    location: "Denver, CO",
    season: "2024 Season",
    tags: ["2024", "championship"],
    standings: [
      { name: "Avery Choi",      school: "Chicago Sack Co.",   score: 198.4 },
      { name: "Sam Rivera",      school: "Unaffiliated",       score: 194.1 },
      { name: "Reese Hammond",   school: "Great Lakes FC",     score: 187.7 },
      { name: "Jordan Ellis",    school: "KC Footbag Club",    score: 181.2 },
      { name: "Casey Patel",     school: "Unaffiliated",       score: 172.9 },
      { name: "Drew Matsuda",    school: "KC Footbag Club",    score: 166.3 },
      { name: "Quinn Adler",     school: "Chicago Sack Co.",   score: 158.8 },
      { name: "Alex Duren",      school: "Omaha Footbag",      score: 149.0 },
      { name: "Morgan Blake",    school: "KC Footbag Club",    score: 140.5 },
      { name: "Robin Okafor",    school: "STL Hackers",        score: 132.1 },
    ]
  }

];
// ════════════════════════════════════════════════════════════════════
//  END OF DATA — don't edit below unless you know what you're doing
// ════════════════════════════════════════════════════════════════════

document.getElementById('yr').textContent = new Date().getFullYear();

let activeFilter = 'all';
let searchQuery  = '';
let expandedCards = new Set();

function matchesFilter(t) {
  if (activeFilter === 'all') return true;
  return t.tags.includes(activeFilter);
}

function matchesSearch(t) {
  if (!searchQuery) return true;
  const q = searchQuery.toLowerCase();
  if (t.title.toLowerCase().includes(q)) return true;
  if (t.location.toLowerCase().includes(q)) return true;
  if (t.season.toLowerCase().includes(q)) return true;
  if (t.standings.some(p => p.name.toLowerCase().includes(q))) return true;
  if (t.standings.some(p => p.school && p.school.toLowerCase().includes(q))) return true;
  return false;
}

function rankClass(i) {
  if (i === 0) return 'gold';
  if (i === 1) return 'silver';
  if (i === 2) return 'bronze';
  return '';
}

function renderCard(t, delay) {
  const maxScore = t.standings[0]?.score || 1;
  const isOpen   = expandedCards.has(t.id);

  const rows = t.standings.map((p, i) => {
    const barW = Math.round((p.score / maxScore) * 80);
    return `
      <tr>
        <td>
          <div class="rank-cell">
            <div class="rank-num ${rankClass(i)}">${i + 1}</div>
            ${p.name}
          </div>
        </td>
        <td style="color:var(--muted);font-size:0.78rem;">${p.school || '—'}</td>
        <td class="right">
          <div class="score-bar-wrap">
            <div class="score-bar" style="width:${barW}px"></div>
            ${p.score.toFixed(1)}
          </div>
        </td>
      </tr>`;
  }).join('');

  return `
    <div class="tournament-card card-reveal" style="animation-delay:${delay}s" data-id="${t.id}">
      <div class="card-header">
        <div class="card-meta">
          <div class="card-season">${t.season}</div>
          <div class="card-title">${t.title}</div>
          <div class="card-info">
            <span>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              ${t.date}
            </span>
            <span>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
              ${t.location}
            </span>
          </div>
        </div>
        <div class="card-badge">
          <span class="num">${t.standings.length}</span>
          <span class="label">Players</span>
        </div>
      </div>

      <div class="standings-wrap ${isOpen ? 'open' : ''}">
        <table class="standings-table">
          <thead>
            <tr>
              <th>Player</th>
              <th>Club / Affiliation</th>
              <th class="right">Score</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>

      <button class="expand-btn ${isOpen ? 'open' : ''}" data-id="${t.id}">
        ${isOpen ? 'Hide standings' : 'View standings'}
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
    </div>`;
}

function render() {
  const grid = document.getElementById('resultsGrid');
  const visible = TOURNAMENTS.filter(t => matchesFilter(t) && matchesSearch(t));

  if (visible.length === 0) {
    grid.innerHTML = `<div class="no-results">No tournaments match your search.</div>`;
    return;
  }

  grid.innerHTML = visible.map((t, i) => renderCard(t, i * 0.06)).join('');

  grid.querySelectorAll('.expand-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const id = btn.dataset.id;
      if (expandedCards.has(id)) expandedCards.delete(id);
      else expandedCards.add(id);
      render();
    });
  });
}

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    render();
  });
});

// Search
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  render();
});

render();
</script>
</body>
</html>
